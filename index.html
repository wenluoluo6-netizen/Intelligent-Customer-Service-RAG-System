<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <title>LangChain Agent UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      /* 背景图片设置：将下面的 URL 替换为你自己的图片路径 */
      background-image: url('/static/girl.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* 如果有背景图片，添加一个半透明的色彩叠加层，使文本更清晰 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: -1;
      pointer-events: none;
    }

    #chat-container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(4px);
    }

    .header {
      padding: 20px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .main-content {
      display: flex;
      flex: 1;
      gap: 20px;
      padding: 20px;
      overflow: hidden;
    }

    .chat-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f8f9fa;
    }

    .chat-log::-webkit-scrollbar {
      width: 8px;
    }

    .chat-log::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    .chat-log::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 4px;
    }

    .chat-log::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 85%;
      word-wrap: break-word;
      line-height: 1.5;
      font-size: 14px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .user {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bot {
      background: white;
      color: #333;
      border: 1px solid #e0e0e0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .input-section {
      padding: 16px;
      background: white;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
    }

    #userInput {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.3s;
    }

    #userInput:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .upload-section {
      width: 320px;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 100%;
      overflow-y: auto;
    }

    .upload-section h3 {
      font-size: 16px;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .upload-section p {
      font-size: 12px;
      color: #666;
      line-height: 1.4;
    }

    .file-input-wrapper {
      position: relative;
      overflow: hidden;
    }

    .file-input-wrapper input[type="file"] {
      display: none;
    }

    .file-input-label {
      display: block;
      padding: 12px 16px;
      background: #f0f0f0;
      border: 2px dashed #ddd;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 13px;
      color: #666;
    }

    .file-input-label:hover {
      background: #e8e8e8;
      border-color: #667eea;
      color: #667eea;
    }

    .file-name {
      padding: 8px 12px;
      background: #e8f0ff;
      border-radius: 6px;
      font-size: 12px;
      color: #667eea;
      text-align: center;
      word-break: break-all;
    }

    .upload-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .upload-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .upload-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #uploadStatus {
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      min-height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #uploadStatus.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    #uploadStatus.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    #uploadStatus.loading {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    /* 响应式设计：小屏幕时隐藏侧边栏 */
    @media (max-width: 1024px) {
      .main-content {
        flex-direction: column;
        gap: 16px;
      }

      .upload-section {
        width: 100%;
        max-height: 300px;
      }

      .bubble {
        max-width: 95%;
      }
    }

    /* 打字提示动画 */
    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: #666;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% {
        opacity: 0.3;
        transform: translateY(0);
      }
      30% {
        opacity: 1;
        transform: translateY(-10px);
      }
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <div class="header">
      <h1>🤖 LangChain Agent</h1>
      <p>智能对话助手 - 内置知识库 + 网络搜索</p>
    </div>

    <div class="main-content">
      <div class="chat-section">
        <div id="log" class="chat-log" aria-live="polite"></div>
        <div class="input-section">
          <input id="userInput" type="text" placeholder="输入你的问题…" />
          <button id="sendBtn">发送</button>
        </div>
      </div>

      <div class="upload-section">
        <h3>📄 知识库管理</h3>
        <p>上传文档扩展知识源，支持 TXT、MD、PDF 格式</p>

        <div class="file-input-wrapper">
          <input id="fileInput" type="file" accept=".txt,.md,.pdf" />
          <label for="fileInput" class="file-input-label">
            📁 点击选择文件或拖拽上传
          </label>
          <div id="fileName" class="file-name" style="display: none;"></div>
        </div>

        <button id="uploadBtn" class="upload-btn">🚀 导入向量库</button>
        <div id="uploadStatus"></div>
      </div>
    </div>
  </div>

  <script>
    const log = document.getElementById("log");
    const input = document.getElementById("userInput");
    const btn = document.getElementById("sendBtn");
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const statusLabel = document.getElementById("uploadStatus");
    const fileNameDiv = document.getElementById("fileName");

    // 初始欢迎消息
    function appendBubble(text, cls) {
      const div = document.createElement("div");
      div.className = "bubble " + cls;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    // 发送消息
    btn.addEventListener("click", async () => {
      const text = input.value.trim();
      if (!text) return;
      appendBubble(text, "user");
      input.value = "";
      btn.disabled = true;

      const session_id = "ui-session";
      try {
        const resp = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id, input: text, stream: false })
        });
        const data = await resp.json();
        appendBubble(data.output || "无法获取回复", "bot");
      } catch (e) {
        appendBubble("错误：" + e.message, "bot");
      } finally {
        btn.disabled = false;
      }
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        btn.click();
      }
    });

    // 文件上传
    fileInput.addEventListener("change", () => {
      const f = fileInput.files[0];
      if (f) {
        fileNameDiv.textContent = "✓ " + f.name;
        fileNameDiv.style.display = "block";
      }
    });

    uploadBtn.addEventListener("click", async () => {
      const f = fileInput.files[0];
      if (!f) {
        statusLabel.textContent = "请先选择一个文件";
        statusLabel.className = "error";
        return;
      }

      const formData = new FormData();
      formData.append("file", f);

      uploadBtn.disabled = true;
      statusLabel.textContent = "正在导入…";
      statusLabel.className = "loading";

      try {
        const resp = await fetch("/api/upload_vector_file", {
          method: "POST",
          body: formData
        });
        const res = await resp.json();

        if (res.status === "ok") {
          const count = res.import?.count || 0;
          statusLabel.innerHTML = `✓ 成功导入 ${count} 个数据块`;
          statusLabel.className = "success";
          fileInput.value = "";
          fileNameDiv.style.display = "none";
        } else {
          statusLabel.textContent = "导入失败：" + (res.detail || "未知错误");
          statusLabel.className = "error";
        }
      } catch (e) {
        statusLabel.textContent = "错误：" + e.message;
        statusLabel.className = "error";
      } finally {
        uploadBtn.disabled = false;
      }
    });

    // 拖拽上传支持
    const label = document.querySelector(".file-input-label");
    ["dragenter", "dragover", "dragleave", "drop"].forEach(eventName => {
      label.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    ["dragenter", "dragover"].forEach(eventName => {
      label.addEventListener(eventName, () => {
        label.style.background = "#e0e8ff";
      });
    });

    ["dragleave", "drop"].forEach(eventName => {
      label.addEventListener(eventName, () => {
        label.style.background = "#f0f0f0";
      });
    });

    label.addEventListener("drop", (e) => {
      const dt = e.dataTransfer;
      const files = dt.files;
      fileInput.files = files;
      const changeEvent = new Event("change", { bubbles: true });
      fileInput.dispatchEvent(changeEvent);
    });

    appendBubble("欢迎使用 LangChain Agent！请输入问题或上传文档扩展知识库。", "bot");
  </script>
</body>
</html>
